<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 — Betting Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232733;
      --border: #2e3345;
      --text: #e1e4ed;
      --text-muted: #8b90a0;
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.08);
      --green-border: rgba(34, 197, 94, 0.25);
      --red: #ef4444;
      --blue: #3b82f6;
      --yellow: #eab308;
      --purple: #a855f7;
      --fanduel: #1493ff;
      --draftkings: #53d337;
      --betmgm: #c4a44a;
      --bovada: #cc3333;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #fff, #93a0f8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .control-group input,
    .control-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .control-group input:focus,
    .control-group select:focus {
      border-color: var(--blue);
    }

    .control-group input[type="number"] {
      width: 160px;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 4px;
    }

    .toggle-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .toggle-group label {
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
    }

    /* Summary bar */
    .summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      min-width: 160px;
    }

    .summary-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .summary-card .value {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .summary-card .value.green { color: var(--green); }
    .summary-card .value.blue { color: var(--blue); }
    .summary-card .value.yellow { color: var(--yellow); }

    /* Date sections */
    .date-section {
      margin-bottom: 28px;
    }

    .date-header {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .date-header:hover {
      background: var(--surface2);
    }

    .date-header .date-summary {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .date-header .chevron {
      transition: transform 0.2s;
    }

    .date-header.collapsed .chevron {
      transform: rotate(-90deg);
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
    }

    .table-wrapper.hidden {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: var(--surface2);
      padding: 10px 12px;
      text-align: left;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      white-space: nowrap;
    }

    /* Game header row */
    tr.game-header td {
      background: var(--surface);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 12px;
      border-top: 2px solid var(--border);
    }

    tr.game-header .match-info {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    tr.game-header .match-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    tr.game-header .home-field {
      background: var(--yellow);
      color: #000;
      font-size: 0.6rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* Outcome rows */
    tr.outcome-row td {
      background: var(--bg);
    }

    tr.outcome-row.has-edge td {
      background: var(--green-bg);
    }

    tr.outcome-row.no-edge td {
      opacity: 0.5;
    }

    tr.outcome-row.no-edge.dimmed td {
      opacity: 0.35;
    }

    .outcome-label {
      font-weight: 600;
    }

    .odds-positive { color: var(--green); }
    .odds-negative { color: var(--red); }

    .bookmaker {
      font-weight: 600;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .bookmaker.fanduel { background: rgba(20, 147, 255, 0.15); color: var(--fanduel); }
    .bookmaker.draftkings { background: rgba(83, 211, 55, 0.15); color: var(--draftkings); }
    .bookmaker.betmgm { background: rgba(196, 164, 74, 0.15); color: var(--betmgm); }
    .bookmaker.bovada { background: rgba(204, 51, 51, 0.15); color: var(--bovada); }

    .edge-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .edge-badge.yes {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .edge-badge.no {
      color: var(--text-muted);
    }

    .kelly-value {
      font-weight: 700;
      color: var(--green);
    }

    .bet-amount {
      font-weight: 700;
      color: var(--yellow);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 12px; }
      .controls { flex-direction: column; gap: 12px; }
      .control-group input[type="number"] { width: 100%; }
    }
  </style>
</head>
<body>

  <h1>⚽ World Cup 2026 Betting Dashboard</h1>
  <p class="subtitle">Model predictions vs. market odds — Kelly Criterion bet sizing · <span id="last-updated" style="color: var(--green); font-weight: 600;"></span></p>

  <div class="controls">
    <div class="control-group">
      <label>Bankroll ($)</label>
      <input type="number" id="bankroll" placeholder="e.g. 1000" min="0" step="100">
    </div>
    <div class="control-group">
      <label>Kelly Fraction</label>
      <select id="kelly-fraction">
        <option value="0.1">10% (Tenth Kelly)</option>
        <option value="0.25" selected>25% (Quarter Kelly)</option>
        <option value="0.33">33% (Third Kelly)</option>
        <option value="0.5">50% (Half Kelly)</option>
        <option value="0.75">75% (Three-Quarter Kelly)</option>
        <option value="1.0">100% (Full Kelly)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Custom Kelly %</label>
      <input type="number" id="kelly-custom" placeholder="e.g. 25" min="1" max="100" step="1">
    </div>
    <div class="control-group">
      <div class="toggle-group">
        <input type="checkbox" id="value-only">
        <label for="value-only">Value bets only</label>
      </div>
    </div>
  </div>

  <div class="summary" id="summary"></div>
  <div id="tables-container"></div>

  <div class="footer">
    Data compiled from model predictions & odds API (FanDuel, BetMGM, Bovada, DraftKings).<br>
    Kelly Criterion: (b×p − q) / b — where b = decimal odds − 1, p = model prob, q = 1 − p.
  </div>

// ============================================================
// Kelly Criterion (client-side)
// ============================================================
function americanToDecimal(american) {
  if (american > 0) return american / 100 + 1;
  return 100 / Math.abs(american) + 1;
}

function kellyPct(modelProb, americanOdds) {
  const decimal = americanToDecimal(americanOdds);
  const b = decimal - 1;
  const p = modelProb;
  const q = 1 - p;
  const kelly = (b * p - q) / b;
  return kelly > 0 ? kelly : 0;
}

function formatOdds(odds) {
  return odds > 0 ? `+${odds}` : `${odds}`;
}

function formatBookmaker(key) {
  const names = {
    fanduel: 'FanDuel',
    draftkings: 'DraftKings',
    betmgm: 'BetMGM',
    bovada: 'Bovada'
  };
  return names[key] || key;
}

// ============================================================
// Render
// ============================================================
function render() {
  const bankroll = parseFloat(document.getElementById('bankroll').value) || 0;
  const kellySelect = document.getElementById('kelly-fraction');
  const kellyCustom = document.getElementById('kelly-custom');
  
  let fraction;
  if (kellyCustom.value && parseFloat(kellyCustom.value) > 0) {
    fraction = parseFloat(kellyCustom.value) / 100;
    kellySelect.value = '';
  } else {
    fraction = parseFloat(kellySelect.value) || 0.25;
  }

  const valueOnly = document.getElementById('value-only').checked;

  // Group by date
  const dateGroups = {};
  DATA.forEach(game => {
    if (!dateGroups[game.date]) dateGroups[game.date] = [];
    dateGroups[game.date].push(game);
  });

  // Calculate all Kelly values for summary
  let totalValueBets = 0;
  let totalSuggested = 0;
  let totalGames = DATA.length;

  const allKellys = [];
  DATA.forEach(game => {
    if (!game.best_market_odds) return;
    const outcomes = ['home', 'away', 'draw'];
    outcomes.forEach(outcome => {
      const modelProb = game.model_pct[outcome] / 100;
      const marketKey = outcome === 'draw' ? 'draw' : outcome;
      const marketOdds = game.best_market_odds[`${marketKey}_odds`];
      const k = kellyPct(modelProb, marketOdds);
      if (k > 0) {
        totalValueBets++;
        totalSuggested += k * fraction * bankroll;
      }
      allKellys.push({ game, outcome, kelly: k });
    });
  });

  // Render summary
  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="label">Total Games</div>
      <div class="value blue">${totalGames}</div>
    </div>
    <div class="summary-card">
      <div class="label">Value Bets Found</div>
      <div class="value green">${totalValueBets}</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Suggested Bets</div>
      <div class="value yellow">${bankroll > 0 ? '$' + totalSuggested.toFixed(2) : '—'}</div>
    </div>
    <div class="summary-card">
      <div class="label">Remaining Bankroll</div>
      <div class="value">${bankroll > 0 ? '$' + Math.max(0, bankroll - totalSuggested).toFixed(2) : '—'}</div>
    </div>
    <div class="summary-card">
      <div class="label">Kelly Fraction</div>
      <div class="value">${(fraction * 100).toFixed(0)}%</div>
    </div>
  `;

  // Render tables
  let html = '';
  const dates = Object.keys(dateGroups).sort((a, b) => {
    const [aM, aD] = a.split('/').map(Number);
    const [bM, bD] = b.split('/').map(Number);
    return aM !== bM ? aM - bM : aD - bD;
  });

  dates.forEach(date => {
    const games = dateGroups[date];
    
    // Count value bets for this date
    let dateValueBets = 0;
    let dateSuggested = 0;
    games.forEach(game => {
      if (!game.best_market_odds) return;
      ['home', 'away', 'draw'].forEach(outcome => {
        const k = kellyPct(game.model_pct[outcome] / 100, game.best_market_odds[`${outcome}_odds`]);
        if (k > 0) {
          dateValueBets++;
          dateSuggested += k * fraction * bankroll;
        }
      });
    });

    html += `
      <div class="date-section">
        <div class="date-header" onclick="toggleDate(this)">
          <span>📅 June ${date.split('/')[1]}, 2026 — ${games.length} games</span>
          <span class="date-summary">
            ${dateValueBets} value bets${bankroll > 0 ? ` · $${dateSuggested.toFixed(2)} suggested` : ''}
            <span class="chevron">▼</span>
          </span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Match</th>
                <th>Outcome</th>
                <th>Model %</th>
                <th>Model Odds</th>
                <th>Market Odds</th>
                <th>Book</th>
                <th>Edge</th>
                <th>Kelly %</th>
                <th>Bet $</th>
                <th>Payout</th>
              </tr>
            </thead>
            <tbody>
    `;

    games.forEach(game => {
      if (!game.best_market_odds) return;

      const outcomes = [
        { key: 'home', label: game.home_team, oddsKey: 'home_odds', bookKey: 'home_bookmaker' },
        { key: 'away', label: game.away_team, oddsKey: 'away_odds', bookKey: 'away_bookmaker' },
        { key: 'draw', label: 'Draw', oddsKey: 'draw_odds', bookKey: 'draw_bookmaker' },
      ];

      // Check if any outcome has edge (for value-only filter)
      const anyEdge = outcomes.some(o => {
        const k = kellyPct(game.model_pct[o.key] / 100, game.best_market_odds[o.oddsKey]);
        return k > 0;
      });

      if (valueOnly && !anyEdge) return;

      // Game header row
      html += `
        <tr class="game-header">
          <td colspan="10">
            <div class="match-info">
              <span>${game.home_team} vs ${game.away_team}</span>
              ${game.home_field ? '<span class="home-field">🏟 Home Field</span>' : ''}
              <span class="match-meta">xG Total: ${(game.home_xg + game.away_xg).toFixed(1)}</span>
            </div>
          </td>
        </tr>
      `;

      outcomes.forEach(o => {
        const modelPct = game.model_pct[o.key];
        const modelOdds = game.model_implied_odds[o.key];
        const marketOdds = game.best_market_odds[o.oddsKey];
        const bookmaker = game.best_market_odds[o.bookKey];
        const decimal = americanToDecimal(marketOdds);
        const k = kellyPct(modelPct / 100, marketOdds);
        const edge = ((modelPct / 100) * decimal - 1) * 100; // edge as percentage
        const hasEdge = k > 0;
        const betAmount = k * fraction * bankroll;
        const payout = betAmount * decimal; // total payout (bet + profit)

        if (valueOnly && !hasEdge) return;

        const rowClass = hasEdge ? 'has-edge' : (valueOnly ? '' : 'no-edge');
        const modelOddsClass = modelOdds > 0 ? 'odds-positive' : 'odds-negative';
        const marketOddsClass = marketOdds > 0 ? 'odds-positive' : 'odds-negative';

        html += `
          <tr class="outcome-row ${rowClass}">
            <td></td>
            <td class="outcome-label">${o.label}</td>
            <td>${modelPct}%</td>
            <td class="${modelOddsClass}">${formatOdds(modelOdds)}</td>
            <td class="${marketOddsClass}">${formatOdds(marketOdds)}</td>
            <td><span class="bookmaker ${bookmaker}">${formatBookmaker(bookmaker)}</span></td>
            <td><span class="edge-badge ${hasEdge ? 'yes' : 'no'}">${hasEdge ? '+' + edge.toFixed(1) + '%' : '—'}</span></td>
            <td>${hasEdge ? `<span class="kelly-value">${(k * fraction * 100).toFixed(2)}%</span>` : '—'}</td>
            <td>${hasEdge && bankroll > 0 ? `<span class="bet-amount">$${betAmount.toFixed(2)}</span>` : '—'}</td>
            <td>${hasEdge && bankroll > 0 ? `<span style="color: var(--purple); font-weight: 700;">$${payout.toFixed(2)}</span>` : '—'}</td>
          </tr>
        `;
      });
    });

    html += `
            </tbody>
          </table>
        </div>
      </div>
    `;
  });

  document.getElementById('tables-container').innerHTML = html;
}

function toggleDate(header) {
  header.classList.toggle('collapsed');
  const wrapper = header.nextElementSibling;
  wrapper.classList.toggle('hidden');
}

// Event listeners
document.getElementById('bankroll').addEventListener('input', render);
document.getElementById('kelly-fraction').addEventListener('change', function() {
  document.getElementById('kelly-custom').value = '';
  render();
});
document.getElementById('kelly-custom').addEventListener('input', function() {
  if (this.value) {
    document.getElementById('kelly-fraction').value = '';
  }
  render();
});
document.getElementById('value-only').addEventListener('change', render);

// Show last updated timestamp
if (typeof LAST_UPDATED !== 'undefined') {
  document.getElementById('last-updated').textContent = '🕐 Updated: ' + LAST_UPDATED + ' ET';
}

// Initial render
render();
</script>
